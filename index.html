    <script>
      // Apply the saved theme before paint to avoid a flash. Defaults to dark.
      (function () {
        try {
          var t = localStorage.getItem("bex_theme");
          if (t === "light") {
            document.documentElement.classList.remove("dark");
          } else {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
